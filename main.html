<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisyUI and tailwindcss CDN links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- font awesome CDN link -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- Google Font link -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<!-- Css link -->
<link rel="stylesheet" href="./style/main.css">

<style>
    *{
      font-family: "Geist", sans-serif;
    }
</style>
</head>
<body>

    <!-- navbar section -->
    <section class="mb-15">
        <div class="navbar bg-base-100 shadow-lg border border-[#ffffffFF] rounded-lg w-10/12 mx-auto p-6 flex justify-between items-center gap-6">

            <div class="flex gap-1 items-center">
                <img
                src="./assets/github-logo.png"
                alt="github-logo-image"
                srcset=""
                class="w-9 h-9"
                />
                <h2 class="text-2xl font-semibold text-[#1f2937FF]">
                    GitHub Issues Tracker
                </h2>
            </div>
            
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto" id="search"/>
    <button class="btn btn-primary font-serif">+New Issue</button>
  </div>

</div>
    </section>

    <!-- buttons section -->
     <section class="mb-4">
        <div class="navbar bg-base-100 shadow-lg border border-[#ffffffFF] rounded-lg w-10/12 mx-auto p-6 space-x-2">
  <a id="allBtn" class="btn font-medium filter-btn btn-active" onclick="loadAllIssues()">All</a>
  <a id="openBtn" class="btn font-medium filter-btn btn-inactive" onclick="loadOpenIssues()">Open</a>
  <a id="closeBtn" class="btn font-medium filter-btn btn-inactive" onclick="loadClosedIssues()">Closed</a>
</div>
     </section>


    <!-- issues section -->
<section class="mb-6">
  <div class="navbar bg-base-100 shadow-lg border border-[#ffffffFF] rounded-lg w-10/12 mx-auto p-6 flex justify-between items-center gap-6 md:grid-cols-2">

    <!-- left side -->
    <div class="flex gap-2 items-center">
      <div class="bg-blue-200 rounded-full border-4 border-blue-200">
        <img src="./assets/Aperture.png" alt="">
      </div>
      <div>
        <h2 class="text-[#1f2937FF] text-xl font-semibold"> <span id="total">0</span> Issues</h2>
        <p class="text-[#64748bFF]">Track and manage your project issues</p>
      </div>
    </div>

    <!-- right side -->
    <div class="flex gap-4 mt-5">
      <div class="flex gap-2 items-center">
        <div class="bg-green-600 w-4 h-4 rounded-full"></div>
        <p class="font-medium text-[#1f2937FF]">Open</p>
      </div>

      <div class="flex gap-2 items-center">
        <div class="bg-purple-600 w-4 h-4 rounded-full"></div>
        <p class="font-medium text-[#1f2937FF]">Closed</p>
      </div>
    </div>

  </div>
</section>


<!-- all issues section -->
 <section id="allIssues" class="w-10/12 mx-auto grid grid-cols-4 grid-width-full gap-6">
 <div class="col-span-full flex justify-center items-center">
   <span id="spinner" class="loading loading-spinner loading-xl hidden "></span>
 </div>
 
  </section>


    <script src="./script/main.js"></script>
</body>
</html>
